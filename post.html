<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Post | Developer Projects</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9445595001927827"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/post.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

    <header class="header">

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            ☰
        </button>

        <div class="logo-area">
            <h1 class="site-title">
                Developer Projects
            </h1>
        </div>

        <nav class="nav">
            <a href="index.html" id="navAbout">
                ABOUT
            </a>

            <a href="projects.html" id="navProjects">
                PROJECTS
            </a>

            <a href="community.html" class="active" id="navCommunity">
                COMMUNITY
            </a>

            <a href="donate.html" id="navDonate">
                DONATE
            </a>
        </nav>

        <div class="header-right">

            <button id="languageBtn">
                한국어
            </button>

        </div>

    </header>

    <section class="hero">

        <div class="hero-decoration">

            <span class="shape shape1"></span>
            <span class="shape shape2"></span>
            <span class="shape shape3"></span>
            <span class="shape shape4"></span>
            <span class="shape shape5">×</span>

        </div>

        <h2 id="communityPageTitle">
            Community
        </h2>

        <p id="communityPageText">
            Development updates, feedback, roadmap and announcements will be shared here.
        </p>

    </section>

    <main class="post-page">

        <a href="community.html" class="back-link" id="backText">
            ← Back
        </a>

        <section class="post-card">

            <div class="post-header">

                <span id="postCategory"></span>

                <h1 id="postTitle"></h1>

                <div class="post-meta">

                    <span id="postDate"></span>

                    <span class="meta-icon">
                        👁
                        <span id="postViews"></span>
                    </span>

                    <span>
                        <button id="likeBtn" class="like-meta-btn">
                            ❤️ <span id="postLikes">0</span>
                        </button>
                    </span>

                </div>

            </div>

            <div id="postContent" class="post-content"></div>

            <div class="post-actions">

                <button id="editPostBtn" title="Edit Post">
                    ✏️
                </button>

                <button id="deletePostBtn" title="Delete Post">
                    🗑️
                </button>

            </div>

        </section>

        <section class="post-ad-section">

            <div class="ad-placeholder">

                Google Adsense Banner

            </div>

        </section>

        <section class="comment-section">

            <h2 id="commentsTitle">
                Comments
            </h2>

            <div id="commentList"></div>

            <div class="comment-form">

                <input type="text" id="nickname" placeholder="Nickname (optional)">

                <textarea id="commentText" placeholder="Write a comment...">
</textarea>

                <button id="commentBtn">
                    Comment
                </button>

            </div>

        </section>

    </main>

    <footer class="footer">

        <div class="footer-content">

            <h3 id="footerTitle">
                Developer Projects
            </h3>

            <p id="footerText">
                Building useful software,
                sharing ideas,
                and learning together.
            </p>

            <p class="footer-copy">
                © 2026 Developer Projects
            </p>

        </div>

    </footer>

    <script src="assets/js/language.js"></script>
    <script src="assets/js/menu.js"></script>
    <script src="assets/js/post.js?v=13"></script>

</body>

</html>
