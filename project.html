<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project | Developer Projects</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/projects.css">
    <link rel="stylesheet" href="assets/css/post.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

    <header class="header">

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            ☰
        </button>

        <div class="logo-area">
            <h1 class="site-title">
                Developer Projects
            </h1>
        </div>

        <nav class="nav">
            <a href="index.html">ABOUT</a>
            <a href="projects.html" class="active">
                PROJECTS
            </a>
            <a href="community.html">
                COMMUNITY
            </a>
            <a href="donate.html">
                DONATE
            </a>
        </nav>

        <div class="header-right">

            <button id="languageBtn">
                한국어
            </button>

        </div>

    </header>

    <section class="hero">

        <div class="hero-decoration">

            <span class="shape shape1"></span> <span class="shape shape2"></span> <span class="shape shape3"></span>
            <span class="shape shape4"></span> <span class="shape shape5">×</span>

        </div>

        <h2>
            Project
        </h2>

        <p>
            Download and information
        </p>

    </section>

    <main class="project-page">

        <div class="project-header-actions">

            <button id="backProjectBtn">
                ✕
            </button>

            <div class="project-manage-actions">

                <button id="editProjectBtn">
                    ✏️
                </button>

                <button id="deleteProjectBtn">
                    🗑️
                </button>

            </div>

        </div>


        <div class="project-card-large">

            <img id="projectThumbnail"
                style="width:300px; height:300px; display:block; object-fit:cover; border-radius:16px; margin:0 auto 20px;">

            <h1 id="projectTitle">
                Loading...
            </h1>

            <p id="projectVersion">
            </p>

            <p id="projectCategory">
            </p>

            <p id="projectDescription">
                Loading...
            </p>

            <a id="downloadBtn" class="download-btn" target="_blank">
                Download
            </a>

        </div>

        <section class="project-ad-section">

    <div class="ad-placeholder">

        Google Adsense Banner

    </div>

</section>

        <section class="comment-section">

            <h2>
                Comments
            </h2>

            <div id="commentList">
            </div>

            <div class="comment-form">

                <input type="text" id="nickname" placeholder="Nickname (optional)">

                <textarea id="commentText" placeholder="Write a comment..."></textarea>

                <button id="commentBtn">
                    Comment
                </button>

            </div>

        </section>

    </main>

    <footer class="footer">

        <div class="footer-content">

            <h3>
                Developer Projects
            </h3>

            <p>
                Building useful software,
                sharing ideas,
                and learning together.
            </p>

            <p class="footer-copy">
                © 2026 Developer Projects
            </p>

        </div>

    </footer>

    <script src="assets/js/menu.js"></script>

        console.log("project page loaded");

    <script src="assets/js/project.js"></script>
